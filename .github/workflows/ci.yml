# PR に対する CI。
# ジョブ名 (pr-title / frontend / backend) は Rulesets の
# required_status_checks の context と一致させているため、変更時は
# scripts/setup-github.sh 側も更新すること。
name: CI

on:
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  # PR タイトルが Conventional Commits に従うかを検証する。
  # squash merge 時に PR タイトルがそのままコミットメッセージになるため、
  # ここで守れば main の履歴が規約準拠になる。
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # 日本語 subject を許可(大文字小文字チェックを無効化)
          subjectPattern: ^.+$

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # NOTE: 初回セットアップ後に package-lock.json をコミットしたら
      # `npm ci` + setup-node の cache 設定へ切り替えることを推奨
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
